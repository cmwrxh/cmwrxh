<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Page Not Found | Brilliant Unicorn LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
    <style>
        :root { --amber: #F59E0B; --bg: #000000; }
        body { background: radial-gradient(circle at top, rgba(245, 158, 11, 0.08), transparent 30%), #000; color: #F3F4F6; font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .logo-glow { filter: drop-shadow(0 0 34px rgba(245, 158, 11, 0.18)); }
        .btn-primary { background: var(--amber); color: #000; transition: all 0.25s ease; }
        .btn-primary:hover { background: #D97706; transform: translateY(-1px); }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-6">
    <div class="glass-card p-12 rounded-sm max-w-lg w-full text-center relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/10 blur-3xl rounded-full -mr-16 -mt-16"></div>
        
        <img src="logo.png" alt="Logo" class="w-20 h-20 rounded-full mx-auto mb-8 border border-amber-500/20 logo-glow object-cover" />
        
        <p class="mono text-xs uppercase tracking-[0.3em] text-amber-400 mb-4">Error 404</p>
        <h1 class="serif text-4xl font-bold mb-6">Systems Offline</h1>
        <p class="text-white/50 mb-10 leading-relaxed">
            The resource you are looking for has been moved, renamed, or does not exist in our current infrastructure.
        </p>
        
        <div class="space-y-4">
            <a href="/" class="btn-primary block w-full py-4 rounded-sm mono text-[10px] uppercase tracking-widest font-bold">
                Return to Command Center
            </a>
            <a href="/contact" class="block text-white/40 hover:text-amber-400 transition mono text-[10px] uppercase tracking-widest">
                Report a Broken Link
            </a>
        </div>
    </div>
</body>
</html>
