name: Metrics and Snake
on:
  schedule: [{cron: "0 0 * * *"}] # Runs at midnight
  workflow_dispatch: # Allows manual run

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. NEW: Check out the repository so the runner can see your files
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Generate Metrics (Languages)
      - name: GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: cmwrxh
          template: classic
          filename: assets/metrics.svg 
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Nairobi
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_limit: 8

      # 3. Generate Snake Animation
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: cmwrxh
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?palette=github-dark

      # 4. Push to Repository
      - name: Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          # Use 'git commit -m' only if there are changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update profile metrics and snake [skip ci]" && git push)
