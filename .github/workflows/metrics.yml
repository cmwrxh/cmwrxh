name: GitHub-Profile-README generation
on:
  schedule:
    - cron: "0 0 * * *"  # daily at midnight UTC
  workflow_dispatch:     # allows manual run from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.svg               # or wherever you commit it
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          
          # Let base sections use defaults first (don't force empty)
          # base: ""                                 # COMMENT THIS OUT or remove if present
          
          # Explicit order: activity first, then languages
          config_order: activity, languages
          
          # Explicitly enable and configure activity (contribution graph + recent events)
          plugin_activity: yes
          plugin_activity_days: 14                   # look back 14 days; change to 30/60/180/365 if needed
          plugin_activity_timestamps: yes            # show commit times
          plugin_activity_limit: 5                   # show up to 5 recent events (increase if you want more)
          
          # Your languages config (keep as-is, it's working)
          plugin_languages: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_threshold: 0%             # show even tiny languages
          plugin_languages_limit: 20                 # plenty for your 13
          
          # Optional but helpful for visibility/debug
          config_animations: yes                     # subtle animations if you like
          config_timezone: Africa/Nairobi            # since you're in EAT/KE
