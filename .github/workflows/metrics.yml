name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate main GitHub metrics (stats + achievements)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          # Output file
          filename: assets/metrics.svg

          # Base sections (clean recruiter layout)
          base: header, activity, community, repositories
          template: classic

          # Languages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_indepth: yes

          # Achievements (trophy-style)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C

          # Contributions calendar summary
          plugin_isocalendar: yes

      - name: Generate Spotify (recent tracks, no Premium required)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          filename: assets/spotify.svg
          base: ""

          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_limit: 1
          plugin_music_played_at: yes
          plugin_music_token: ${{ secrets.SPOTIFY_TOKENS }}
