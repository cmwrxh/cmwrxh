name: Metrics and Snake
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: cmwrxh
          template: classic
          filename: assets/metrics.svg 
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Nairobi
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_limit: 8

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: cmwrxh
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?palette=github-dark

      - name: Sync and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          if ! git diff --cached --quiet; then
            git commit -m "docs: update profile assets [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected."
          fi
