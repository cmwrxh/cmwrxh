permissions:
  contents: write          # Usually needed for pushing commits, tags, releases
  pull-requests: write     # For commenting on PRs, labeling, assigning
  issues: write            # If modifying issues
  actions: write           # Sometimes for runner registration or other actions
  security-events: write   # Critical if uploading SARIF/code scanning results
  checks: write            # For check runs/statuses
name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # No token here — uses default GITHUB_TOKEN

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}  # This needs to exist as secret
          template: classic
          config_order: languages
          config_timezone: Africa/Nairobi

          plugin_languages: yes
          plugin_languages_limit: 20
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage,lines,bytes-size
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 2
          plugin_languages_categories: markup,programming
          plugin_languages_colors: github

          base: ""
          base_indepth: false
