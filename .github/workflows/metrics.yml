name: Metrics
on:
  # Schedule updates (daily at midnight)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below allow you to run it manually from the Actions tab
  workflow_dispatch:
  # Also runs when you push to main
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your Personal Access Token (stored in Secrets)
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: cmwrxh
          template: classic
          base: header, activity, community, repositories, metadata
          
          # Plugin: Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          
          # Output location (matches the link in your README)
          filename: assets/metrics.svg
