name: GitHub-Profile-README generation
on:
  schedule:
    - cron: "0 0 * * *"  # daily
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}  # optional PAT for more data
          template: classic
          base: ""                             # or "header, activity, community, repositories, metadata" if you want to be explicit
          config_order: activity, languages    # ← this is the key change
          plugin_languages: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_threshold: 0%       # show all, even tiny %
          plugin_languages_limit: 20           # up to 20 languages
          # Add these if you want the detailed/most used breakdown more visible
          # plugin_languages_analysis_timeout: 15   # minutes, optional
          # plugin_languages_indepth: yes           # more accurate but slower
