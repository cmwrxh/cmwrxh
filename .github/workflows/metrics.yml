name: Generate GitHub Profile Stats

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:     # Allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Stats Cards
        uses: anuraghazra/github-readme-stats@master
        with:
          # No 'with' params needed here; we generate via URLs below.
          # But this action is often used directly in README embeds.
          # For self-hosted generation in Actions, we use curl/fetch method below for reliability.

      # Alternative reliable method: Fetch and save SVGs directly (recommended for stability)
      - name: Fetch and Save Stats SVGs
        run: |
          mkdir -p assets

          # 1. Main Stats Card (commits, PRs, stars, etc. - includes contribution graph activity)
          curl -s "https://github-readme-stats.vercel.app/api?username=cmwrxh&show_icons=true&theme=radical&hide_rank=true&include_all_commits=true&count_private=true" -o assets/stats.svg

          # 2. Top Languages Card (your most used languages - adjust count as needed)
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=cmwrxh&layout=compact&theme=radical&langs_count=10&hide=html,css&card_width=500" -o assets/top-langs.svg

          # 3. Streak Stats (contribution streak / activity calendar-like)
          curl -s "https://github-readme-streak-stats.herokuapp.com?user=cmwrxh&theme=radical&hide_border=true" -o assets/streak.svg

      - name: Commit changes if any
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add assets/*.svg
          git commit -m "Update profile stats cards [skip ci]" || echo "No changes to commit"
          git push
