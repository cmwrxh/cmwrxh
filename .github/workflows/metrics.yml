name: Generate GitHub Profile Stats

on:
  schedule:
    - cron: "0 0 * * *"  # daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Save Stats SVGs
        run: |
          set -e
          mkdir -p assets

          # 1) Main stats card
          curl -fsSL "https://github-readme-stats.vercel.app/api?username=cmwrxh&show_icons=true&theme=radical&hide_rank=true&include_all_commits=true&count_private=true" \
            -o assets/stats.svg

          # 2) Top languages
          curl -fsSL "https://github-readme-stats.vercel.app/api/top-langs/?username=cmwrxh&layout=compact&theme=radical&langs_count=10&hide=html,css&card_width=500" \
            -o assets/top-langs.svg

          # 3) Streak stats
          curl -fsSL "https://github-readme-streak-stats.herokuapp.com?user=cmwrxh&theme=radical&hide_border=true" \
            -o assets/streak.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/*.svg

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update profile stats cards [skip ci]"
          git push
