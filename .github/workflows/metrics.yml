name: GitHub-Profile-README generation
on:
  schedule:
    - cron: "0 0 * * *"  # daily
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          base: ""   # Keep this if you want full control via config_order
          config_order: base.header, base.activity, languages, base.repositories, base.metadata  # Try this first
          plugin_languages: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_threshold: 0%
          plugin_languages_limit: 20
          # Add these for better activity visibility
          plugin_activity: yes
          plugin_activity_days: 30
          plugin_activity_timestamps: yes
