name: Metrics and Snake
on:
  schedule: [{cron: "0 0 * * *"}] # Runs at midnight
  workflow_dispatch: # Allows manual run

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Generate Metrics (Languages)
      - name: GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: cmwrxh
          template: classic
          # This line ensures it goes into the assets folder
          filename: assets/metrics.svg 
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Nairobi
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_limit: 8

      # 2. Generate Snake Animation
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: cmwrxh
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?palette=github-dark

      # 3. Explicitly Push to Main
      - name: Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "docs: update profile metrics and snake [skip ci]" || exit 0
          git push
