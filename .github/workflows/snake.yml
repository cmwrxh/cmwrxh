name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: cmwrxh
          # FIX: Replaced # with %23 so the colors parse correctly
          outputs: |
            assets/github-snake.svg?palette=github-dark&color_snake=FF7A18&color_dots=%230B0B0B,%231a1a1a,%23FDBA74,%23F97316,%23FF7A18

      - name: Commit snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-snake.svg
          # Added --rebase to ensure the push is always smooth
          git commit -m "update snake" || echo "No changes"
          git pull --rebase origin main
          git push
