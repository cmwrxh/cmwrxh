name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: cmwrxh
          outputs: |
            assets/github-snake.svg?palette=github-dark&color_snake=FF7A18&color_dots=#0B0B0B,#1a1a1a,#FDBA74,#F97316,#FF7A18

      - name: Commit snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-snake.svg
          git commit -m "update snake" || echo "No changes"
          git push
