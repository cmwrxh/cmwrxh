<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products | Brilliant Unicorn LLC</title>
    <meta name="description" content="Instant-access digital frameworks and Notion-based systems. Buy once, deploy forever. Implementation support available as add-on." />

    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />

    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script src="https://app.lemonsqueezy.com/js/lemon.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        :root {
            --amber: #F59E0B;
            --amber-dark: #D97706;
            --bg: #000000;
            --panel: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text: #F3F4F6;
        }

        html { scroll-behavior: smooth; }

        body {
            background: radial-gradient(circle at top, rgba(245, 158, 11, 0.08), transparent 30%), #000000;
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }

        .serif { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(10px);
            transition: all 0.35s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(245, 158, 11, 0.45);
            background: rgba(255, 255, 255, 0.045);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.08);
        }

        .nav-border { border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
        .section-border { border-top: 1px solid rgba(255, 255, 255, 0.06); }
        .logo-glow { filter: drop-shadow(0 0 34px rgba(245, 158, 11, 0.18)); }

        .btn-primary {
            background: var(--amber);
            color: #000;
            transition: all 0.25s ease;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: inline-block;
        }

        .btn-primary:hover {
            background: var(--amber-dark);
            transform: translateY(-1px);
        }

        .hero-grid {
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0));
        }

        .badge-amber, .instant-badge {
            display: inline-block;
            background: rgba(245, 158, 11, 0.15);
            color: #F59E0B;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .instant-badge {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.5);
        }
    </style>
</head>
