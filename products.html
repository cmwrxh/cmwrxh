<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    :root {
      --black: #000000;
      --dark: #0a0a0a;
      --yellow: #ffea00;     /* bright startup yellow */
      --yellow-dark: #d4c200;
      --text: #f0f0f0;
      --muted: #bbbbbb;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--black);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: var(--yellow); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

    header {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #222;
      z-index: 100;
      padding: 20px 0;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--yellow);
    }
    .brand img {
      width: 90px;
      height: 90px;
      object-fit: contain;
    }
    nav a {
      margin-left: 28px;
      font-weight: 600;
      color: var(--muted);
    }
    nav a.active, nav a:hover { color: var(--yellow); }

    .hero {
      padding: 120px 0 80px;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(3rem, 8vw, 5.5rem);
      margin-bottom: 24px;
      color: var(--yellow);
      line-height: 1.1;
    }
    .hero p {
      font-size: 1.3rem;
      max-width: 720px;
      margin: 0 auto 40px;
      color: var(--muted);
    }
    .btn {
      display: inline-block;
      background: var(--yellow);
      color: #000;
      font-weight: 800;
      padding: 16px 32px;
      border-radius: 999px;
      margin: 12px;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--yellow-dark); transform: translateY(-2px); }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--yellow);
      color: var(--yellow);
    }
    .btn-gumroad {
      background: linear-gradient(135deg, var(--yellow), #ffd700);
      color: #000;
    }

    section { padding: 100px 0; }
    h2 { font-size: 3rem; color: var(--yellow); margin-bottom: 40px; text-align: center; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 32px;
    }
    .card {
      background: #111;
      padding: 32px;
      border-radius: var(--radius);
      border: 1px solid #222;
    }
    .card h3 { color: var(--yellow); margin-bottom: 16px; font-size: 1.6rem; }
    .price { color: var(--yellow); font-size: 2.2rem; font-weight: bold; margin: 16px 0; }
    .note { color: var(--muted); font-size: 0.95rem; margin-bottom: 20px; }

    .bundle-card {
      background: linear-gradient(135deg, #1a1a00, #111100);
      border: 2px solid var(--yellow);
    }
    .best-value {
      display: inline-block;
      background: var(--yellow);
      color: #000;
      padding: 6px 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    footer {
      background: #000;
      border-top: 1px solid #222;
      padding: 60px 0 40px;
      text-align: center;
      color: var(--muted);
    }
    footer a { color: var(--yellow); }
